    <circle  cx="302" cy="238" r="6"  fill="#0d0808"/>
    <circle  cx="306" cy="234" r="2.5" fill="white" opacity="0.7"/>
    <path d="M282,222 Q302,214 322,220" fill="none" stroke="#1a0f08" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="378" cy="238" rx="18" ry="12" fill="#0d0808"/>
