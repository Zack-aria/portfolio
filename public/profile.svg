    <polyline points="570,65 600,65 600,95"/>
    <polyline points="110,535 80,535 80,505"/>
    <polyline points="570,535 600,535 600,505"/>
  </g>

  <!-- Data lines -->
  <g stroke="#22d3ee" stroke-width="0.8" opacity="0.3" fill="none">
    <polyline points="30,620 80,580 130,600 180,555 230,570"/>
    <polyline points="450,570 500,545 550,560 600,530 650,545"/>
