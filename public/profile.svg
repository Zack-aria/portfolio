    <ellipse cx="340" cy="285" rx="16" ry="10" fill="#a86038" opacity="0.5"/>
    <circle  cx="328" cy="290" r="6" fill="#a06030" opacity="0.4"/>
    <circle  cx="352" cy="290" r="6" fill="#a06030" opacity="0.4"/>
