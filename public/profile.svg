    <ellipse cx="340" cy="328" rx="18" ry="8"  fill="#1a0f08" opacity="0.3"/>
    <path d="M322,316 Q340,322 358,316" fill="none" stroke="#1a0f08" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
