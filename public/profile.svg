    <circle cx="248" cy="178" r="28" fill="#140a04"/>
    <circle cx="258" cy="158" r="24" fill="#1a0f08"/>
    <circle cx="272" cy="142" r="22" fill="#140a04"/>
    <circle cx="268" cy="200" r="20" fill="#1a0f08"/>
    <circle cx="255" cy="218" r="16" fill="#0d0808" opacity="0.8"/>
    <circle cx="432" cy="178" r="28" fill="#140a04"/>
    <circle cx="422" cy="158" r="24" fill="#1a0f08"/>
    <circle cx="408" cy="142" r="22" fill="#140a04"/>
    <circle cx="412" cy="200" r="20" fill="#1a0f08"/>
    <circle cx="425" cy="218" r="16" fill="#0d0808" opacity="0.8"/>
    <circle cx="310" cy="135" r="26" fill="#1a0f08"/>
    <circle cx="340" cy="128" r="28" fill="#140a04"/>
    <circle cx="370" cy="135" r="26" fill="#1a0f08"/>
    <circle cx="325" cy="118" r="20" fill="#0d0808"/>
    <circle cx="355" cy="116" r="20" fill="#1a0f08"/>
    <circle cx="340" cy="108" r="18" fill="#140a04"/>
