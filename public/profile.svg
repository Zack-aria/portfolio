  <circle cx="80"  cy="580" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="180" cy="555" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="500" cy="545" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="600" cy="530" r="2.5" fill="#22d3ee" opacity="0.5"/>

  <!-- Name -->
  <text x="340" y="610" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="28" font-weight="700" fill="#e2e8f0" letter-spacing="1">EL BOUDALI ZAKARIA</text>

  <!-- Title badge -->
  <rect x="200" y="625" width="280" height="32" rx="16" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="1" opacity="0.8"/>
  <circle cx="218" cy="641" r="5" fill="#22d3ee" opacity="0.9"/>
  <text x="340" y="647" text-anchor="middle" font-family="'Inter',sans-serif" font-size="13" font-weight="500" fill="#22d3ee" letter-spacing="2">BI ANALYST · JUNIOR</text>

  <!-- Skill pills -->
  <rect x="174" y="672" width="60"  height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.35"/>
  <text x="204" y="687" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">SQL</text>
  <rect x="244" y="672" width="76"  height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.35"/>
  <text x="282" y="687" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">Power BI</text>
  <rect x="330" y="672" width="56"  height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.35"/>
  <text x="358" y="687" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">Python</text>
  <rect x="396" y="672" width="52"  height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.35"/>
  <text x="422" y="687" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">ETL</text>
  <rect x="458" y="672" width="48"  height="22" rx="11" fill="none" stroke="#22d3ee" opacity="0.35"/>
  <text x="482" y="687" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">DAX</text>
