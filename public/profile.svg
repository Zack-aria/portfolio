<svg width="680" height="720" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>El Boudali Zakaria — BI Analyst</title>
  <defs>
    <clipPath id="circleClip">
      <circle cx="340" cy="280" r="200"/>
    </clipPath>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0f2040"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="glowRing" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#050d1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.35"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c8956a"/>
      <stop offset="100%" stop-color="#a07248"/>
    </radialGradient>
    <radialGradient id="faceShadow" cx="60%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#8a5e38" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8a5e38" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jacketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1a0f08"/>
      <stop offset="100%" stop-color="#0d0808"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="40%" stop-color="#050d1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050d1a" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="680" height="720" fill="url(#bgGrad)"/>

