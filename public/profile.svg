    <line x1="0" y1="180" x2="680" y2="180"/><line x1="0" y1="240" x2="680" y2="240"/>
    <line x1="0" y1="300" x2="680" y2="300"/><line x1="0" y1="360" x2="680" y2="360"/>
    <line x1="0" y1="420" x2="680" y2="420"/><line x1="0" y1="480" x2="680" y2="480"/>
    <line x1="0" y1="540" x2="680" y2="540"/><line x1="0" y1="600" x2="680" y2="600"/>
    <line x1="0" y1="660" x2="680" y2="660"/>
    <line x1="60"  y1="0" x2="60"  y2="720"/><line x1="120" y1="0" x2="120" y2="720"/>
    <line x1="180" y1="0" x2="180" y2="720"/><line x1="240" y1="0" x2="240" y2="720"/>
    <line x1="300" y1="0" x2="300" y2="720"/><line x1="360" y1="0" x2="360" y2="720"/>
    <line x1="420" y1="0" x2="420" y2="720"/><line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="540" y1="0" x2="540" y2="720"/><line x1="600" y1="0" x2="600" y2="720"/>
