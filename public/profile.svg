    <ellipse cx="440" cy="265" rx="14" ry="18" fill="#b8784a"/>
    <ellipse cx="438" cy="265" rx="8"  ry="12" fill="#a0623a"/>
    <ellipse cx="340" cy="255" rx="95" ry="110" fill="#c08050"/>
    <ellipse cx="268" cy="260" rx="35" ry="65" fill="#a06838" opacity="0.35"/>
    <ellipse cx="395" cy="250" rx="20" ry="50" fill="#d09060" opacity="0.25"/>
